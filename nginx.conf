server {
  listen 8080;
  server_name agentic-diagram;

  # Security headers that a <meta>-delivered CSP can't express (the CSP itself
  # is emitted by SvelteKit into each page — see kit.csp in svelte.config.js).
  # `always` so they're sent on error responses too. Set at server scope: any
  # `add_header` inside a location would drop these, so don't add one there.
  add_header X-Frame-Options "DENY" always;                    # clickjacking
  add_header X-Content-Type-Options "nosniff" always;          # MIME sniffing
  add_header Referrer-Policy "no-referrer" always;             # don't leak URLs
  add_header Permissions-Policy "geolocation=(), camera=(), microphone=()" always;

  location / {
    root /usr/share/nginx/html;
    # SvelteKit static build: fall back to the SPA entry for client-side routes.
    try_files $uri $uri/ /index.html;
  }
}
